name: build-and-release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed to create GitHub Releases
  packages: write   # needed to push the server image to GHCR

env:
  GO_VERSION: "1.23"
  IMAGE_NAME: ghcr.io/${{ github.repository }}-server

jobs:
  # ---------------------------------------------------------------------
  # Cross-platform build matrix for the game client. Ebiten needs cgo and
  # native GUI/graphics headers, so each OS builds natively on its own
  # runner rather than cross-compiling from one host.
  # ---------------------------------------------------------------------
  build-game:
    name: build game (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            artifact: pixelkeep-linux-amd64
          - os: windows-latest
            goos: windows
            artifact: pixelkeep-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            artifact: pixelkeep-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux GUI/graphics build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxinerama-dev libxxf86vm-dev libasound2-dev pkg-config

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.artifact }}" ./cmd/game

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Headless telemetry/metrics server: built and pushed as a container
  # image via the multi-stage Dockerfile (CGO_ENABLED=0, distroless).
  # ---------------------------------------------------------------------
  build-server-image:
    name: build server image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  # On a version tag push (v1.2.3), gather every platform binary and
  # publish them as a single GitHub Release.
  # ---------------------------------------------------------------------
  release:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-game, build-server-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package binaries
        run: |
          cd dist
          for d in */; do
            name="${d%/}"
            (cd "$name" && zip -r "../${name}.zip" .)
          done
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
